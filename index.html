<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pradham AI Receptionist</title>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      margin-top:120px;
      background:#f4f4f4;
    }

    button{
      padding:18px 40px;
      font-size:20px;
      border:none;
      border-radius:10px;
      background:#2b7cff;
      color:white;
      cursor:pointer;
    }

    button:hover{
      background:#174fd6;
    }

    .status{
      margin-top:20px;
      font-size:18px;
      color:#333;
    }
  </style>
</head>

<body>

<h1>Welcome to Pradham AI</h1>
<p>Click the button to talk to the AI receptionist.</p>

<button id="talkBtn">🎤 Talk to AI Receptionist</button>
<div class="status" id="status">Status: Idle</div>

<script type="module">

import Vapi from "https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/+esm";

const PUBLIC_KEY = "pk_live_0c50737e-9511-4940-b17c-751796162c53";
const ASSISTANT_ID = "57d1edf4-c6c3-4f6c-a024-01255dc43a72";

const status = document.getElementById("status");
const button = document.getElementById("talkBtn");

console.log("Vapi module loaded");

const vapi = new Vapi(PUBLIC_KEY);

button.addEventListener("click", async () => {

  status.innerText = "Status: Starting assistant...";

  try {

    await vapi.start(ASSISTANT_ID);

    status.innerText = "Status: Connected. Speak now.";

  } catch (error) {

    console.error(error);
    status.innerText = "Status: Error starting assistant";

  }

});

</script>

</body>
</html>
