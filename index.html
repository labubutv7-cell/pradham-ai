<!DOCTYPE html>
<html>
<head>

<title>Pradham AI Receptionist</title>

<!-- Vapi Browser SDK -->
<script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/browser/vapi.min.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:120px;
background:#f4f4f4;
}

button{
padding:18px 40px;
font-size:20px;
border:none;
border-radius:10px;
background:#2b7cff;
color:white;
cursor:pointer;
}

button:hover{
background:#1a5edb;
}

.status{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>Welcome to Pradham AI</h1>
<p>Click the button to talk to the AI receptionist.</p>

<button id="talkBtn">🎤 Talk to AI Receptionist</button>

<div class="status" id="status">Status: Idle</div>

<script>

window.addEventListener("load", function(){

console.log("Page loaded");

const PUBLIC_KEY = "pk_live_0c50737e-9511-4940-b17c-751796162c53";
const ASSISTANT_ID = "57d1edf4-c6c3-4f6c-a024-01255dc43a72";

const button = document.getElementById("talkBtn");
const status = document.getElementById("status");

if(typeof Vapi === "undefined"){

console.error("Vapi SDK failed to load");
status.innerText = "Status: SDK failed to load";

return;

}

console.log("Vapi SDK loaded");

const vapi = new Vapi(PUBLIC_KEY);

button.onclick = async () => {

console.log("Starting assistant");

status.innerText = "Status: Connecting...";

try{

await vapi.start(ASSISTANT_ID);

status.innerText = "Status: Connected. Speak now.";

console.log("Assistant connected");

}catch(error){

console.error("Connection error:", error);

status.innerText = "Status: Connection failed";

}

};

});

</script>

</body>
</html>
